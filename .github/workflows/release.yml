name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build VideoTools (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download ffmpeg for bundling
        shell: pwsh
        run: |
          # GitHub-hosted Windows runners have ffmpeg in PATH, but we need it in ./ffmpeg/ for bundling
          $ffmpegDir = "ffmpeg"
          New-Item -ItemType Directory -Path $ffmpegDir -Force | Out-Null
          # Download a portable ffmpeg build for Windows
          $url = "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg-build.zip" -UseBasicParsing
          Expand-Archive -Path "ffmpeg-build.zip" -DestinationPath "ffmpeg-extracted" -Force
          # Find and copy ffmpeg.exe and ffprobe.exe
          $binDir = Get-ChildItem -Path "ffmpeg-extracted" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
          Copy-Item "$binDir\ffmpeg.exe" "ffmpeg\ffmpeg.exe"
          Copy-Item "$binDir\ffprobe.exe" "ffmpeg\ffprobe.exe"
          Write-Host "ffmpeg.exe: $((Get-Item 'ffmpeg\ffmpeg.exe').Length / 1MB)MB"
          Write-Host "ffprobe.exe: $((Get-Item 'ffmpeg\ffprobe.exe').Length / 1MB)MB"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller videotools.spec --distpath dist --noconfirm

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $zipName = "VideoTools-${{ github.ref_name }}-windows.zip"
          Compress-Archive -Path "dist\VideoTools" -DestinationPath "dist\$zipName"
          Write-Host "Created: dist\$zipName ($([Math]::Round((Get-Item "dist\$zipName").Length/1MB,1))MB)"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/VideoTools-${{ github.ref_name }}-windows.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VideoTools ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/VideoTools-${{ github.ref_name }}-windows.zip
